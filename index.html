<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>FlightSim — výběr hry</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: system-ui, sans-serif; }
    body {
      background: linear-gradient(165deg, #1a1430 0%, #402a4e 55%, #b0503c 100%);
      color: #fff; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 26px; padding: 24px;
    }
    h1 { font-size: 34px; text-shadow: 0 2px 10px rgba(0,0,0,.5); }
    .cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
    a.card {
      display: block; width: 300px; padding: 22px; border-radius: 16px;
      background: rgba(255,255,255,.10); border: 1px solid rgba(255,255,255,.25);
      color: #fff; text-decoration: none; backdrop-filter: blur(4px);
      transition: transform .15s, background .15s;
    }
    a.card:hover { transform: translateY(-3px); background: rgba(255,255,255,.17); }
    .card h2 { font-size: 22px; margin-bottom: 8px; }
    .card p { opacity: .85; line-height: 1.45; font-size: 14px; }
    .em { font-size: 40px; display: block; margin-bottom: 10px; }
  </style>
</head>
<body>
  <h1>🛦 FlightSim</h1>
  <div class="cards">
    <a class="card" href="/skrysov.html">
      <span class="em">🏞️</span>
      <h2>F-16 nad Skrýšovem</h2>
      <p>Volný let stíhačkou nad reálnou krajinou Vysočiny. Na severu za horami Miami, na západě kaňon.</p>
    </a>
    <a class="card" href="/redbull.html">
      <span class="em">🏁</span>
      <h2>Red Bull Air Race</h2>
      <p>Závod kolem pylonů nad Red Bull Ringem ve Spielbergu. Braný v pořadí, penalizace za dotyk pylonu. Leť na čas!</p>
    </a>
  </div>
</body>
</html>
